<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Profile Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
    <div class="card">
        <div class="card-header">
            <img src="images/profile.png" alt="Profile Picture">
        </div>
        <div class="card-body">
            <h2>Krishna Ajith </h2>
            <p class="role">
                Integrated MSc Computer Science Student
            </p>
            <p class="bio">

                Passionate Computer Science student interested in
                AI, Full Stack Development and building modern web
                applications.

            </p>
            <ul class="skills">

                <li>HTML</li>

                <li>CSS</li>

                <li>JavaScript</li>

                <li>Python</li>

                <li>Git</li>

                <li>Node.js</li>

            </ul>
            <div class="socials">
                <a href="https://www.linkedin.com/in/krishna-ajith-902518289/"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://github.com/krishnajithkicha"><i class="fab fa-github"></i></a>
            </div>
        </div>

</body>

</html>
